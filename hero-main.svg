<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E8F0FA"/>
    </linearGradient>

    <!-- 메인 차트 라인 그라디언트 -->
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E5BA8" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#1E5BA8"/>
      <stop offset="100%" stop-color="#2E7BC9"/>
    </linearGradient>

    <!-- 차트 영역 채우기 -->
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E5BA8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1E5BA8" stop-opacity="0"/>
    </linearGradient>

    <!-- J 글자 그라디언트 -->
    <linearGradient id="jLetterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2E5C"/>
      <stop offset="100%" stop-color="#1E5BA8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="500" fill="url(#bgGrad)"/>

  <!-- 배경 그리드 (은은한 차트 느낌) -->
  <g stroke="#CBD5E1" stroke-width="1" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
  </g>

  <!-- 메인 차트 (우상향, 장기 누적 성장 곡선) -->
  <!-- 영역 채우기 -->
  <path d="M 0 420
           Q 100 415, 150 400
           T 280 370
           T 420 340
           T 560 290
           T 700 240
           T 840 180
           T 980 120
           T 1120 80
           L 1200 65
           L 1200 500
           L 0 500 Z"
        fill="url(#fillGrad)"/>

  <!-- 라인 -->
  <path d="M 0 420
           Q 100 415, 150 400
           T 280 370
           T 420 340
           T 560 290
           T 700 240
           T 840 180
           T 980 120
           T 1120 80
           L 1200 65"
        fill="none" stroke="url(#chartGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- 이정표 점들 (재테크의 리듬) -->
  <g>
    <circle cx="280" cy="370" r="5" fill="#fff" stroke="#1E5BA8" stroke-width="2"/>
    <circle cx="560" cy="290" r="5" fill="#fff" stroke="#1E5BA8" stroke-width="2"/>
    <circle cx="840" cy="180" r="5" fill="#fff" stroke="#1E5BA8" stroke-width="2"/>
    <circle cx="1120" cy="80" r="8" fill="#F59E0B" stroke="#fff" stroke-width="3"/>
  </g>

  <!-- 중앙 J 심볼 + 타이틀 -->
  <g transform="translate(140, 180)">
    <!-- J 아이콘 박스 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="110" height="110" rx="22" fill="url(#jLetterGrad)"/>
      <line x1="36" y1="30" x2="80" y2="30" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 60 30 L 60 68 Q 60 83 46 83 Q 33 83 33 72"
            fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 72 60 L 79 54 L 85 56 L 92 48"
            fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="92" cy="48" r="3.5" fill="#F59E0B"/>
    </g>

    <!-- 타이틀 텍스트 -->
    <g transform="translate(140, 10)">
      <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
            font-size="15" font-weight="500" fill="#1E5BA8" letter-spacing="3">J-WORK</text>

      <text x="0" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
            font-size="44" font-weight="700" fill="#0F2E5C" letter-spacing="-1">재테크가 즐거운 일이 되는 곳</text>

      <text x="0" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
            font-size="18" font-weight="400" fill="#64748B" letter-spacing="0">Joy meets Work — 즐거움이 깃든 일, 꾸준한 성장의 기록.</text>
    </g>
  </g>

  <!-- 연도 마커 (하단, 장기 투자 느낌) -->
  <g font-family="-apple-system, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">
    <text x="150" y="470">2020</text>
    <text x="420" y="470">2022</text>
    <text x="700" y="470">2024</text>
    <text x="980" y="470">2026</text>
    <text x="1140" y="470" fill="#F59E0B" font-weight="600">∞</text>
  </g>
</svg>

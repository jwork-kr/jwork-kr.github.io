<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식회사 제이워크</title>
  <meta name="description" content="주식회사 제이워크(J-Work Corporation) 공식 홈페이지 — 전자공고 지정 웹사이트">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #ffffff; color: #24292f; line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      border-bottom: 1px solid #d0d7de; padding: 20px 40px;
      display: flex; justify-content: space-between; align-items: center;
    }
    header .brand { font-weight: 600; font-size: 15px; color: #57606a; text-decoration: none; }
    header nav a {
      color: #0969da; text-decoration: none; font-size: 14px; margin-left: 16px;
    }
    header nav a:hover { text-decoration: underline; }
    header nav a.active { color: #24292f; font-weight: 600; }

    main {
      flex: 1; max-width: 820px; width: 100%;
      margin: 0 auto; padding: 80px 40px;
    }
    h1 {
      font-size: 2em; font-weight: 600; margin-bottom: 24px;
      padding-bottom: 12px; border-bottom: 1px solid #d0d7de;
    }
    p { font-size: 16px; margin-bottom: 16px; color: #24292f; }

    .notice-box {
      background: #f6f8fa; border: 1px solid #d0d7de; border-left: 3px solid #0969da;
      border-radius: 6px; padding: 16px 20px; margin: 24px 0;
      font-size: 14px; color: #24292f;
    }
    .notice-box strong { color: #0969da; }

    .cta-group { margin-top: 24px; display: flex; gap: 8px; flex-wrap: wrap; }
    .cta {
      display: inline-block; padding: 8px 16px; background: #0969da;
      color: white; text-decoration: none; border-radius: 6px;
      font-size: 14px; font-weight: 500;
    }
    .cta:hover { background: #0860ca; }
    .cta.secondary { background: #f6f8fa; color: #24292f; border: 1px solid #d0d7de; }
    .cta.secondary:hover { background: #eef2f5; }

    footer {
      border-top: 1px solid #d0d7de; padding: 20px 40px;
      font-size: 13px; color: #57606a; text-align: center;
    }
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      main { padding: 40px 20px; }
      footer { padding: 16px 20px; }
      h1 { font-size: 1.6em; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="brand">jwork-kr</a>
    <nav>
      <a href="index.html" class="active">홈</a>
      <a href="about.html">회사 소개</a>
      <a href="board.html">공고</a>
    </nav>
  </header>

  <main>
    <h1>주식회사 제이워크</h1>
    <p>주식회사 제이워크(J-Work Corporation) 공식 홈페이지입니다.</p>

    <div class="notice-box">
      <strong>전자공고 안내</strong><br>
      본 회사는 정관 제4조에 따라 상법상 모든 공고를 본 인터넷 홈페이지에 게재합니다.
      공고 내용은 <a href="board.html" style="color:#0969da;">공고 게시판</a>에서 확인하실 수 있습니다.
    </div>

    <div class="cta-group">
      <a href="board.html" class="cta">공고 게시판 바로가기 →</a>
      <a href="about.html" class="cta secondary">회사 소개</a>
    </div>
  </main>

  <footer>
    &copy; 2026 J-Work Corporation. All rights reserved.
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식회사 제이워크</title>
  <meta name="description" content="주식회사 제이워크(J-Work Corporation) 공식 홈페이지">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #ffffff;
      color: #24292f;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid #d0d7de;
      padding: 20px 40px;
      font-weight: 600;
      font-size: 15px;
      color: #57606a;
    }

    main {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 80px 40px;
    }

    h1 {
      font-size: 2em;
      font-weight: 600;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #d0d7de;
    }

    p {
      font-size: 16px;
      margin-bottom: 16px;
      color: #24292f;
    }

    footer {
      border-top: 1px solid #d0d7de;
      padding: 20px 40px;
      font-size: 13px;
      color: #57606a;
      text-align: center;
    }

    @media (max-width: 600px) {
      header, main, footer { padding-left: 20px; padding-right: 20px; }
      main { padding-top: 40px; padding-bottom: 40px; }
      h1 { font-size: 1.6em; }
    }
  </style>
</head>
<body>
  <header>jwork-kr</header>

  <main>
    <h1>환영합니다</h1>
    <p>주식회사 제이워크(J-Work Corporation)의 홈페이지입니다.</p>
    <p>현재 홈페이지 제작 중에 있습니다.</p>
  </main>

  <footer>
    &copy; 2026 J-Work Corporation. All rights reserved.
  </footer>
</body>
</html>

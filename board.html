<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공고 게시판 - 주식회사 제이워크</title>
  <meta name="description" content="주식회사 제이워크 전자공고 게시판 — 상법상 공고 지정 웹사이트">
  <link rel="icon" type="image/svg+xml" href="logo-icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #ffffff; color: #0F172A; line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      border-bottom: 1px solid #E2E8F0; padding: 16px 40px;
      display: flex; justify-content: space-between; align-items: center;
      background: #fff;
    }
    header .brand { display: flex; align-items: center; text-decoration: none; }
    header .brand img { height: 36px; width: auto; }
    header nav a {
      color: #1E5BA8; text-decoration: none; font-size: 14px;
      margin-left: 20px; font-weight: 500;
    }
    header nav a:hover { text-decoration: underline; }
    header nav a.active { color: #0F2E5C; font-weight: 700; }

    main {
      flex: 1; max-width: 960px; width: 100%;
      margin: 0 auto; padding: 48px 40px;
    }
    h1 {
      font-size: 1.8em; font-weight: 700; margin-bottom: 8px; color: #0F2E5C;
    }
    .subtitle {
      font-size: 14px; color: #64748B; margin-bottom: 24px;
    }

    .disclosure-banner {
      background: #F8FAFC; border: 1px solid #E2E8F0; border-left: 3px solid #1E5BA8;
      border-radius: 8px; padding: 16px 20px; margin-bottom: 28px;
      font-size: 13px; color: #334155; line-height: 1.6;
    }
    .disclosure-banner strong { color: #1E5BA8; }
    .disclosure-banner code {
      background: #fff; padding: 2px 6px; border-radius: 4px;
      border: 1px solid #E2E8F0; font-size: 12px;
    }

    .controls {
      display: flex; gap: 12px; margin-bottom: 20px;
      flex-wrap: wrap; align-items: center;
    }
    .search-box { flex: 1; min-width: 240px; position: relative; }
    .search-box input {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1px solid #E2E8F0; border-radius: 8px;
      font-size: 14px; font-family: inherit; background: #F8FAFC; color: #0F172A;
    }
    .search-box input:focus {
      outline: none; border-color: #1E5BA8; background: #fff;
      box-shadow: 0 0 0 3px rgba(30, 91, 168, 0.15);
    }
    .search-box svg {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); color: #94A3B8; pointer-events: none;
    }
    .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 13px; border: 1px solid #E2E8F0;
      background: #F8FAFC; color: #0F172A; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: inherit;
      transition: all 0.12s;
    }
    .filter-btn:hover { background: #EEF2F7; }
    .filter-btn.active { background: #1E5BA8; color: white; border-color: #1E5BA8; }

    .count-info { font-size: 13px; color: #64748B; margin-bottom: 12px; }

    .post-list {
      border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden;
    }
    .post-item {
      padding: 16px 20px; border-bottom: 1px solid #E2E8F0;
      cursor: pointer; transition: background 0.12s;
      display: block; text-decoration: none; color: inherit;
    }
    .post-item:last-child { border-bottom: none; }
    .post-item:hover { background: #F8FAFC; }
    .post-meta {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 6px; font-size: 12px; color: #64748B;
    }
    .post-category {
      display: inline-block; padding: 2px 8px;
      border-radius: 12px; font-weight: 500; font-size: 11px;
    }
    .cat-결산공고 { background: #DBEAFE; color: #1E5BA8; }
    .cat-주주채권자공고 { background: #FEF3C7; color: #92400E; }
    .cat-기타공고 { background: #D1FAE5; color: #065F46; }

    .post-title {
      font-size: 15px; font-weight: 600; color: #0F172A; margin-bottom: 4px;
    }
    .post-summary {
      font-size: 13px; color: #64748B; line-height: 1.5;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .empty-state {
      padding: 60px 20px; text-align: center; color: #64748B; font-size: 14px;
    }
    .pagination {
      display: flex; justify-content: center; gap: 4px;
      margin-top: 24px; flex-wrap: wrap;
    }
    .pagination button {
      padding: 7px 13px; border: 1px solid #E2E8F0;
      background: #fff; color: #0F172A; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-family: inherit; min-width: 36px;
    }
    .pagination button:hover:not(:disabled) { background: #F8FAFC; }
    .pagination button.active { background: #1E5BA8; color: white; border-color: #1E5BA8; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

    .post-detail { display: none; }
    .post-detail .back-link {
      display: inline-flex; align-items: center; gap: 4px;
      margin-bottom: 16px; color: #1E5BA8; text-decoration: none; font-size: 14px;
    }
    .post-detail .back-link:hover { text-decoration: underline; }
    .post-detail .detail-header {
      border-bottom: 1px solid #E2E8F0; padding-bottom: 20px; margin-bottom: 24px;
    }
    .post-detail h2 {
      font-size: 1.6em; font-weight: 700;
      margin-bottom: 12px; color: #0F2E5C;
    }
    .post-detail .detail-meta {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      font-size: 13px; color: #64748B;
    }
    .post-detail .content { font-size: 15px; line-height: 1.8; color: #0F172A; }
    .post-detail .content p { margin-bottom: 12px; }
    .post-detail .content ul,
    .post-detail .content ol { margin: 12px 0 12px 24px; }
    .post-detail .content li { margin-bottom: 4px; }
    .post-detail .content h3 {
      margin: 24px 0 12px; font-size: 1.1em; font-weight: 600; color: #1E5BA8;
    }
    .post-detail .content table {
      border-collapse: collapse; margin: 16px 0; font-size: 14px; width: 100%;
      max-width: 600px;
    }
    .post-detail .content td, .post-detail .content th {
      border: 1px solid #E2E8F0; padding: 10px 14px; text-align: left;
    }
    .post-detail .content th { background: #F8FAFC; font-weight: 600; color: #334155; }
    .post-detail .content td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .post-detail .content em {
      font-style: normal; color: #64748B; font-size: 13px;
    }
    .post-detail .content blockquote {
      margin: 16px 0; padding: 12px 16px;
      background: #F8FAFC; border-left: 3px solid #E2E8F0;
      color: #64748B; font-size: 14px;
    }

    body.detail-view .list-view { display: none; }
    body.detail-view .post-detail { display: block; }

    footer {
      border-top: 1px solid #E2E8F0; padding: 24px 40px;
      font-size: 13px; color: #64748B; text-align: center; background: #F8FAFC;
    }
    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      header .brand img { height: 28px; }
      header nav a { margin-left: 12px; font-size: 13px; }
      main { padding: 32px 20px; }
      footer { padding: 20px; }
      h1 { font-size: 1.5em; }
      .controls { flex-direction: column; align-items: stretch; }
      .post-detail h2 { font-size: 1.3em; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="brand">
      <img src="logo-main.svg" alt="J-Work — 주식회사 제이워크">
    </a>
    <nav>
      <a href="index.html">홈</a>
      <a href="about.html">회사 소개</a>
      <a href="board.html" class="active">공고</a>
    </nav>
  </header>

  <main>
    <section class="list-view">
      <h1>공고 게시판</h1>
      <p class="subtitle">주식회사 제이워크의 상법상 공고 및 회사 공지사항</p>

      <div class="disclosure-banner">
        <strong>전자공고 지정 웹사이트 안내</strong><br>
        본 회사(주식회사 제이워크, 법인등록번호 134811-0557332)는 상법 제289조 제3항 및 정관 제4조에 따라
        본 인터넷 홈페이지(<code>https://jwork-kr.github.io</code>)를 공고방법으로 지정하였습니다.
        본 게시판에 게시된 공고는 상법상 적법한 공고로서 효력을 가집니다.
      </div>

      <div class="controls">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11.5 11.5L14 14M7 13A6 6 0 1 1 7 1a6 6 0 0 1 0 12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search" placeholder="제목 또는 내용 검색…" autocomplete="off">
        </div>
        <div class="filter-group" id="filters">
          <button class="filter-btn active" data-category="all">전체</button>
        </div>
      </div>

      <div class="count-info" id="countInfo"></div>
      <div class="post-list" id="postList"></div>
      <div class="pagination" id="pagination"></div>
    </section>

    <article class="post-detail">
      <a href="#" class="back-link" id="backLink">← 목록으로</a>
      <div class="detail-header">
        <h2 id="detail-title"></h2>
        <div class="detail-meta">
          <span class="post-category" id="detail-category"></span>
          <span id="detail-date"></span>
          <span id="detail-author"></span>
        </div>
      </div>
      <div class="content" id="detail-content"></div>
    </article>
  </main>

  <footer>
    &copy; 2026 J-Work Corporation. All rights reserved.
  </footer>

  <script>
    const PAGE_SIZE = 10;
    let allPosts = [];
    let filteredPosts = [];
    let currentPage = 1;
    let currentCategory = 'all';
    let currentSearch = '';

    async function loadPosts() {
      try {
        const res = await fetch('posts.json');
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        allPosts = (data.posts || []).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        const cats = [...new Set(allPosts.map(p => p.category).filter(Boolean))];
        const filtersEl = document.getElementById('filters');
        cats.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.dataset.category = cat;
          btn.textContent = cat;
          filtersEl.appendChild(btn);
        });

        bindFilterClicks();
        applyFilters();
        handleRoute();
      } catch (err) {
        document.getElementById('postList').innerHTML =
          '<div class="empty-state">공고 데이터를 불러올 수 없습니다.<br><small>posts.json 파일이 있는지 확인하거나 웹 서버에서 열어주세요.</small></div>';
      }
    }

    function bindFilterClicks() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = btn.dataset.category;
          currentPage = 1;
          applyFilters();
        });
      });
    }

    function applyFilters() {
      filteredPosts = allPosts.filter(post => {
        if (currentCategory !== 'all' && post.category !== currentCategory) return false;
        if (currentSearch) {
          const q = currentSearch.toLowerCase();
          const hay = [post.title, post.summary, post.content, post.category, post.author]
            .filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      renderList();
    }

    function catClass(cat) {
      return 'cat-' + (cat || '').replace(/\s+/g, '');
    }

    function renderList() {
      const listEl = document.getElementById('postList');
      const countEl = document.getElementById('countInfo');
      const total = filteredPosts.length;
      countEl.textContent = total > 0 ? `총 ${total}건` : '';
      if (total === 0) {
        listEl.innerHTML = '<div class="empty-state">해당하는 공고가 없습니다.</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      const start = (currentPage - 1) * PAGE_SIZE;
      const pagePosts = filteredPosts.slice(start, start + PAGE_SIZE);
      listEl.innerHTML = pagePosts.map(post => `
        <a href="#post=${encodeURIComponent(post.id)}" class="post-item">
          <div class="post-meta">
            <span class="post-category ${catClass(post.category)}">${esc(post.category)}</span>
            <span>${esc(post.date)}</span>
          </div>
          <div class="post-title">${esc(post.title)}</div>
          <div class="post-summary">${esc(post.summary || '')}</div>
        </a>
      `).join('');
      renderPagination(total);
    }

    function renderPagination(total) {
      const pages = Math.ceil(total / PAGE_SIZE);
      const pgEl = document.getElementById('pagination');
      if (pages <= 1) { pgEl.innerHTML = ''; return; }
      let html = '';
      html += `<button ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">이전</button>`;
      for (let i = 1; i <= pages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      html += `<button ${currentPage === pages ? 'disabled' : ''} data-page="${currentPage + 1}">다음</button>`;
      pgEl.innerHTML = html;
      pgEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.dataset.page);
          renderList();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    function handleRoute() {
      const hash = window.location.hash;
      const m = hash.match(/^#post=(.+)$/);
      if (m) {
        const id = decodeURIComponent(m[1]);
        const post = allPosts.find(p => p.id === id);
        if (post) { renderDetail(post); return; }
      }
      document.body.classList.remove('detail-view');
    }

    function renderDetail(post) {
      document.getElementById('detail-title').textContent = post.title;
      const catEl = document.getElementById('detail-category');
      catEl.textContent = post.category || '';
      catEl.className = 'post-category ' + catClass(post.category);
      document.getElementById('detail-date').textContent = '공고일: ' + (post.date || '');
      document.getElementById('detail-author').textContent = post.author || '';
      document.getElementById('detail-content').innerHTML = post.content || '';
      document.title = post.title + ' - 주식회사 제이워크';
      document.body.classList.add('detail-view');
      window.scrollTo(0, 0);
    }

    function esc(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    document.getElementById('search').addEventListener('input', e => {
      currentSearch = e.target.value.trim();
      currentPage = 1;
      applyFilters();
    });

    document.getElementById('backLink').addEventListener('click', e => {
      e.preventDefault();
      history.pushState(null, '', 'board.html');
      document.title = '공고 게시판 - 주식회사 제이워크';
      handleRoute();
    });

    window.addEventListener('hashchange', handleRoute);
    loadPosts();
  </script>
</body>
</html>

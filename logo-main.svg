<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="jgrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F2E5C"/>
      <stop offset="60%" stop-color="#1E5BA8"/>
      <stop offset="100%" stop-color="#2E7BC9"/>
    </linearGradient>
  </defs>

  <!-- J 기호 (재테크 차트로 변형) -->
  <g transform="translate(20, 20)">
    <!-- J의 상단 가로선 -->
    <line x1="8" y1="10" x2="48" y2="10" stroke="#0F2E5C" stroke-width="6" stroke-linecap="round"/>

    <!-- J의 세로선 + 하단 커브 + 우상향 차트선 (한 획) -->
    <path d="M 32 10 L 32 55 Q 32 75 18 75 Q 6 75 6 62"
          fill="none" stroke="url(#jgrad1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 차트 상승선 (J 뒤에서 우상향으로 뻗어나가는 선) -->
    <path d="M 48 65 L 58 55 L 68 58 L 78 42 L 88 48 L 98 28 L 108 32 L 118 15"
          fill="none" stroke="#2E7BC9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 최종 도달점 원 (성장의 정점) -->
    <circle cx="118" cy="15" r="5" fill="#F59E0B"/>
    <circle cx="118" cy="15" r="2" fill="#fff"/>
  </g>

  <!-- 회사명 워드마크 -->
  <g transform="translate(170, 52)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="32" font-weight="700" fill="#0F2E5C" letter-spacing="-1">J-Work</text>
    <text x="0" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" font-weight="500" fill="#6B7280" letter-spacing="2">JOY  ·  WORK  ·  WEALTH</text>
  </g>
</svg>
